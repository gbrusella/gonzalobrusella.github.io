<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2410"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- cube faces (top lit, sides shaded) -->
  <polygon points="50,12 83,31 50,50 17,31" fill="#e8c45a" fill-opacity="0.30"/>
  <polygon points="17,31 50,50 50,88 17,69" fill="#caa23e" fill-opacity="0.15"/>
  <polygon points="83,31 83,69 50,88 50,50" fill="#caa23e" fill-opacity="0.07"/>
  <!-- gold edges -->
  <g fill="none" stroke="#f0cf6b" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="50,12 83,31 83,69 50,88 17,69 17,31"/>
